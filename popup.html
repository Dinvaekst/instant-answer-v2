<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instant Answer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#020617;
  --card:rgba(15,23,42,.82);
  --card2:rgba(15,23,42,.92);
  --border:rgba(255,255,255,.09);
  --text:#f8fafc;
  --muted:#94a3b8;
  --soft:#cbd5e1;
  --primary:#7c3aed;
  --primary2:#2563eb;
  --green:#22c55e;
  --danger:#ef4444;
  --shadow:0 24px 70px rgba(0,0,0,.55);
}

body{
  width:430px;
  height:620px;
  overflow:hidden;
  font-family:Inter, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(124,58,237,.45),transparent 35%),
    radial-gradient(circle at bottom right,rgba(37,99,235,.28),transparent 38%),
    #020617;
  padding:12px;
}

.app{
  height:100%;
  overflow:hidden;
  border-radius:34px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  background:linear-gradient(180deg,rgba(15,23,42,.84),rgba(2,6,23,.92));
  border:1px solid var(--border);
  backdrop-filter:blur(22px);
  box-shadow:var(--shadow);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  font-size:14px;
  font-weight:900;
  letter-spacing:-.2px;
  background:linear-gradient(90deg,#ffffff,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.top-actions{
  display:flex;
  gap:7px;
}

button{
  border:none;
  cursor:pointer;
  transition:.18s ease;
  font-family:Inter, Arial, sans-serif;
}

.small-btn{
  padding:8px 10px;
  border-radius:14px;
  font-size:10px;
  font-weight:900;
  color:white;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.075);
}

.small-btn:hover{
  background:rgba(255,255,255,.1);
  transform:translateY(-1px);
}

.hero{
  padding:2px 2px 0;
}

.hero h1{
  font-size:37px;
  line-height:.92;
  letter-spacing:-2px;
  font-weight:950;
  background:linear-gradient(180deg,#fff,#c4b5fd);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.subtitle{
  margin-top:9px;
  font-size:12.5px;
  line-height:1.45;
  color:var(--muted);
}

.status-row{
  display:flex;
  gap:7px;
  margin-top:12px;
}

.status-pill{
  padding:9px 11px;
  border-radius:999px;
  font-size:10.5px;
  font-weight:900;
  white-space:nowrap;
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  box-shadow:0 10px 25px rgba(124,58,237,.3);
}

#accountStatus{
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:none;
  color:#dbeafe;
}

#pageStatus{
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--muted);
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.07);
  box-shadow:none;
}

.mode-tabs{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:7px;
}

.mode-tab{
  padding:10px 5px;
  border-radius:16px;
  font-size:10px;
  font-weight:900;
  color:var(--muted);
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.07);
}

.mode-tab:hover{
  color:white;
  background:rgba(255,255,255,.085);
}

.mode-tab.active{
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  border-color:transparent;
  box-shadow:0 12px 28px rgba(124,58,237,.35);
}

.panel{
  flex:1;
  min-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  border-radius:28px;
  padding:15px;
  background:var(--card2);
  border:1px solid rgba(255,255,255,.07);
}

.panel-head{
  margin-bottom:12px;
}

.panel-title{
  font-size:21px;
  font-weight:900;
  letter-spacing:-.5px;
}

.panel-subtitle{
  margin-top:5px;
  font-size:12px;
  line-height:1.45;
  color:var(--muted);
}

#result{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding-right:4px;
  margin-bottom:11px;
  font-size:13.5px;
  line-height:1.65;
}

.msg{
  margin-bottom:11px;
  padding:13px;
  border-radius:20px;
  animation:fadeUp .22s ease;
}

.user-msg{
  margin-left:42px;
  color:white;
  background:linear-gradient(135deg,var(--primary),#9333ea);
  box-shadow:0 12px 24px rgba(124,58,237,.3);
}

.ai-msg{
  margin-right:18px;
  color:#e2e8f0;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.075);
}

.msg-role{
  font-size:9.5px;
  font-weight:900;
  opacity:.65;
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:.8px;
}

.answer-box{
  animation:fadeUp .22s ease;
}

.answer-label{
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:900;
  color:#a78bfa;
  margin-bottom:7px;
}

.answer-title{
  font-size:19px;
  font-weight:900;
  margin-bottom:9px;
  color:white;
}

.answer-content h1,
.answer-content h2,
.answer-content h3{
  margin:12px 0 6px;
  color:white;
}

.composer{
  display:flex;
  flex-direction:column;
  gap:9px;
}

textarea,
.auth-input{
  width:100%;
  outline:none;
  border:none;
  padding:13px;
  border-radius:18px;
  font-size:13px;
  line-height:1.45;
  font-family:Inter, Arial, sans-serif;
  color:white;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.075);
}

textarea{
  height:78px;
  resize:none;
}

textarea::placeholder,
.auth-input::placeholder{
  color:#64748b;
}

textarea:focus,
.auth-input:focus{
  border-color:rgba(124,58,237,.65);
  box-shadow:0 0 0 4px rgba(124,58,237,.14);
}

.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}

.primary-btn,
.secondary-btn{
  width:100%;
  padding:12px;
  border-radius:18px;
  font-size:13px;
  font-weight:900;
}

.primary-btn{
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  box-shadow:0 12px 28px rgba(124,58,237,.32);
}

.primary-btn:hover{
  transform:translateY(-1px);
}

.secondary-btn{
  color:white;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.075);
}

.secondary-btn:hover{
  background:rgba(255,255,255,.09);
}

.mode-tools{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  margin-bottom:10px;
}

.tool-btn{
  padding:10px 6px;
  border-radius:14px;
  font-size:10px;
  font-weight:900;
  color:var(--muted);
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.07);
}

.tool-btn.active{
  color:white;
  background:linear-gradient(135deg,var(--primary),var(--primary2));
  border-color:transparent;
}

.file-box,
.account-box{
  display:none;
  margin-bottom:10px;
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.035);
  border:1px dashed rgba(255,255,255,.13);
}

.file-box input{
  width:100%;
  color:white;
  font-size:11px;
}

#pdfFileName,
#imageFileName{
  margin-top:8px;
  font-size:11px;
  color:var(--muted);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.auth-grid{
  display:grid;
  gap:8px;
}

.auth-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.account-mini{
  font-size:11px;
  color:var(--muted);
  line-height:1.45;
}

.memory-item,
.chat-item,
.math-formula-block,
.source-box,
.history-item{
  margin-top:10px;
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.075);
}

.memory-item,
.chat-item{
  font-size:12px;
  color:#e5e7eb;
}

.math-inline{
  padding:3px 6px;
  border-radius:8px;
  background:rgba(255,255,255,.07);
  color:#c4b5fd;
  font-weight:800;
}

.code-block{
  background:rgba(0,0,0,.36);
  border:1px solid rgba(255,255,255,.08);
  padding:12px;
  border-radius:14px;
  overflow:auto;
  margin:10px 0;
  font-size:12px;
  line-height:1.6;
  color:#e5e7eb;
}

.loading{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

.typing-dots{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:12px;
}

.typing-dots span{
  width:7px;
  height:7px;
  background:#a78bfa;
  border-radius:50%;
  animation:dotPulse 1.2s infinite ease-in-out;
}

.typing-dots span:nth-child(2){
  animation-delay:.2s;
}

.typing-dots span:nth-child(3){
  animation-delay:.4s;
}

.hidden{
  display:none !important;
}

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  border-radius:999px;
  background:rgba(255,255,255,.14);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes dotPulse{
  0%,80%,100%{
    opacity:.25;
    transform:scale(.8);
  }
  40%{
    opacity:1;
    transform:scale(1.15);
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="top">
    <div class="brand">Instant Answer AI</div>

    <div class="top-actions">
      <button id="accountBtn" class="small-btn" type="button">Account</button>
      <button id="historyBtn" class="small-btn" type="button">History</button>
      <button id="clearBtn" class="small-btn" type="button">Clear</button>
    </div>
  </div>

  <div class="hero">
    <h1>Instant<br>Answer</h1>

    <div class="subtitle">
      Fast AI for chat, pages, study, math, PDFs and images.
    </div>

    <div class="status-row">
      <div id="proStatus" class="status-pill">Free</div>
      <div id="accountStatus" class="status-pill">Guest</div>
      <div id="pageStatus" class="status-pill">Ready</div>
    </div>
  </div>

  <div class="mode-tabs">
    <button id="chatModeBtn" class="mode-tab active" type="button">Chat</button>
    <button id="pageModeBtn" class="mode-tab" type="button">Page</button>
    <button id="studyModeBtn" class="mode-tab" type="button">Study</button>
    <button id="mathModeBtn" class="mode-tab" type="button">Math</button>
    <button id="filesModeBtn" class="mode-tab" type="button">Files</button>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div id="panelTitle" class="panel-title">Chat Mode</div>
      <div id="panelSubtitle" class="panel-subtitle">Ask anything and get a clean answer.</div>
    </div>

    <div id="result">
      <div class="loading">Ready</div>
    </div>

    <div id="accountTools" class="mode-tools">
      <button id="loginPanelBtn" class="tool-btn active" type="button">Login</button>
      <button id="memoryPanelBtn" class="tool-btn" type="button">Memory</button>
      <button id="chatsPanelBtn" class="tool-btn" type="button">Chats</button>
    </div>

    <div id="accountBox" class="account-box">
      <div class="auth-grid">
        <input id="authEmail" class="auth-input" type="email" placeholder="Email" />
        <input id="authPassword" class="auth-input" type="password" placeholder="Password" />
        <div class="auth-row">
          <button id="loginBtn" class="secondary-btn" type="button">Login</button>
          <button id="signupBtn" class="primary-btn" type="button">Sign up</button>
        </div>
        <button id="logoutBtn" class="secondary-btn" type="button">Logout</button>
        <div id="authInfo" class="account-mini">Login to sync memory and saved chats.</div>
      </div>
    </div>

    <div id="pageTools" class="mode-tools">
      <button id="pageContextBtn" class="tool-btn active" type="button">Page</button>
      <button id="selectedTextBtn" class="tool-btn" type="button">Selected</button>
      <button id="screenshotBtn" class="tool-btn" type="button">Screenshot</button>
    </div>

    <div id="mathTools" class="mode-tools">
      <button id="calcToolBtn" class="tool-btn active" type="button">Calculate</button>
      <button id="equationToolBtn" class="tool-btn" type="button">Equation</button>
      <button id="wordToolBtn" class="tool-btn" type="button">Word</button>
    </div>

    <div id="filesTools" class="mode-tools">
      <button id="pdfToolBtn" class="tool-btn active" type="button">PDF</button>
      <button id="imageToolBtn" class="tool-btn" type="button">Image</button>
      <button id="summaryToolBtn" class="tool-btn" type="button">Summary</button>
    </div>

    <div id="pdfUploadBox" class="file-box">
      <input id="pdfFileInput" type="file" accept="application/pdf,.pdf" />
      <div id="pdfFileName">No PDF selected</div>
    </div>

    <div id="imageUploadBox" class="file-box">
      <input id="imageFileInput" type="file" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp" />
      <div id="imageFileName">No image selected</div>
    </div>

    <div class="composer">
      <textarea id="mainInput" placeholder="Skriv dit spørgsmål..."></textarea>

      <div class="action-row">
        <button id="mainActionBtn" class="primary-btn" type="button">Send</button>
        <button id="pageActionBtn" class="secondary-btn" type="button">Read page</button>
      </div>
    </div>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
