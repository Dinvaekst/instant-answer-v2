<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Instant Answer</title>

  <style>
    * { box-sizing: border-box; }

    body {
      width: 430px;
      height: 620px;
      margin: 0;
      padding: 14px;
      font-family: Arial, sans-serif;
      background: #eef1f6;
      color: #111827;
      overflow: hidden;
    }

    .app {
      height: 100%;
      background: #ffffff;
      border-radius: 26px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: 0 18px 45px rgba(15,23,42,0.12);
    }

    .top { display: flex; justify-content: space-between; align-items: center; }
    .brand { font-size: 14px; font-weight: 900; }
    .top-actions { display: flex; gap: 8px; }

    button { font-family: Arial, sans-serif; cursor: pointer; }

    .small-btn {
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      border-radius: 12px;
      padding: 8px 11px;
      font-size: 11px;
      font-weight: 900;
      color: #111827;
    }

    .hero h1 {
      margin: 8px 0 6px;
      font-size: 30px;
      line-height: 0.95;
      letter-spacing: -1.4px;
      font-weight: 900;
    }

    .subtitle {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.45;
      margin-bottom: 10px;
    }

    .status-row { display: flex; gap: 8px; align-items: center; }

    #proStatus {
      background: #111827;
      color: white;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 11px;
      font-weight: 900;
      white-space: nowrap;
    }

    #pageStatus {
      flex: 1;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 9px 11px;
      font-size: 12px;
      color: #6b7280;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .mode-tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 7px;
    }

    .mode-tab {
      border: 1px solid #e5e7eb;
      background: #f9fafb;
      color: #111827;
      border-radius: 14px;
      padding: 10px 6px;
      font-size: 11px;
      font-weight: 900;
    }

    .mode-tab.active {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    .panel {
      flex: 1;
      min-height: 0;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 20px;
      padding: 14px;
      display: flex;
      flex-direction: column;
    }

    .panel-head { margin-bottom: 10px; }
    .panel-title { font-size: 18px; font-weight: 900; margin-bottom: 3px; }
    .panel-subtitle { font-size: 12px; color: #6b7280; line-height: 1.4; }

    #result {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      font-size: 14px;
      line-height: 1.65;
      color: #111827;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      height: 76px;
      resize: none;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 10px;
      font-family: Arial, sans-serif;
      font-size: 13px;
      outline: none;
      background: white;
    }

    .math-tools,
    .pdf-tools {
      display: none;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
      margin-bottom: 8px;
    }

    .math-tool-btn,
    .pdf-tool-btn {
      border: 1px solid #e5e7eb;
      background: white;
      color: #111827;
      border-radius: 12px;
      padding: 8px 6px;
      font-size: 10px;
      font-weight: 900;
    }

    .math-tool-btn.active,
    .pdf-tool-btn.active {
      background: #111827;
      color: white;
      border-color: #111827;
    }

    .file-box {
      display: none;
      margin-bottom: 8px;
      background: white;
      border: 1px dashed #cbd5e1;
      border-radius: 14px;
      padding: 10px;
    }

    .file-box input {
      width: 100%;
      font-size: 11px;
    }

    #pdfFileName {
      margin-top: 6px;
      font-size: 11px;
      color: #6b7280;
      font-weight: 800;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .primary-btn, .secondary-btn {
      width: 100%;
      border-radius: 14px;
      padding: 12px;
      font-weight: 900;
      margin-top: 8px;
    }

    .primary-btn {
      border: 0;
      background: #111827;
      color: white;
    }

    .secondary-btn {
      border: 1px solid #e5e7eb;
      background: white;
      color: #111827;
    }

    .msg { margin-bottom: 10px; padding: 10px; border-radius: 14px; }
    .user-msg { background: #111827; color: white; }
    .ai-msg { background: white; border: 1px solid #e5e7eb; }

    .answer-label {
      font-size: 10px;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 900;
      margin-bottom: 6px;
    }

    .answer-title {
      font-size: 19px;
      font-weight: 900;
      margin-bottom: 10px;
      color: #020617;
    }

    .math-formula-block,
    .source-box,
    .history-item {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 10px;
      margin: 10px 0;
    }

    .math-inline {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 2px 5px;
      font-weight: 800;
    }

    .loading {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6b7280;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 999px; }
  </style>
</head>

<body>
  <div class="app">

    <div class="top">
      <div class="brand">Instant Answer AI</div>
      <div class="top-actions">
        <button id="historyBtn" class="small-btn" type="button">History</button>
        <button id="clearBtn" class="small-btn" type="button">Clear</button>
      </div>
    </div>

    <div class="hero">
      <h1>Instant<br>Answer</h1>
      <div class="subtitle">Choose one mode and work focused.</div>

      <div class="status-row">
        <div id="proStatus">Free</div>
        <div id="pageStatus">Ready</div>
      </div>
    </div>

    <div class="mode-tabs">
      <button id="chatModeBtn" class="mode-tab active" type="button">Chat</button>
      <button id="mathModeBtn" class="mode-tab" type="button">Math</button>
      <button id="studyModeBtn" class="mode-tab" type="button">Study</button>
      <button id="analyzeModeBtn" class="mode-tab" type="button">Analyze</button>
      <button id="pdfModeBtn" class="mode-tab" type="button">PDF</button>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div id="panelTitle" class="panel-title">Chat Mode</div>
        <div id="panelSubtitle" class="panel-subtitle">Ask anything and get a clear answer.</div>
      </div>

      <div id="result">
        <div class="loading">Ready</div>
      </div>

      <div id="mathTools" class="math-tools">
        <button id="calcToolBtn" class="math-tool-btn active" type="button">Calculator</button>
        <button id="equationToolBtn" class="math-tool-btn" type="button">Equation</button>
        <button id="percentToolBtn" class="math-tool-btn" type="button">Percent</button>
        <button id="graphToolBtn" class="math-tool-btn" type="button">Graph</button>
        <button id="formulaToolBtn" class="math-tool-btn" type="button">Formula</button>
        <button id="wordToolBtn" class="math-tool-btn" type="button">Word</button>
      </div>

      <div id="pdfTools" class="pdf-tools">
        <button id="pdfSummaryBtn" class="pdf-tool-btn active" type="button">Summary</button>
        <button id="pdfNotesBtn" class="pdf-tool-btn" type="button">Notes</button>
        <button id="pdfFlashcardsBtn" class="pdf-tool-btn" type="button">Cards</button>
        <button id="pdfQuizBtn" class="pdf-tool-btn" type="button">Quiz</button>
        <button id="pdfCitationsBtn" class="pdf-tool-btn" type="button">Citations</button>
        <button id="pdfImportantBtn" class="pdf-tool-btn" type="button">Important</button>
      </div>

      <div id="pdfUploadBox" class="file-box">
        <input id="pdfFileInput" type="file" accept="application/pdf,.pdf" />
        <div id="pdfFileName">No PDF selected</div>
      </div>

      <textarea id="mainInput" placeholder="Skriv dit spørgsmål..."></textarea>
      <button id="mainActionBtn" class="primary-btn" type="button">Send</button>
      <button id="pageActionBtn" class="secondary-btn" type="button" style="display:none;">Analyze current page</button>
    </div>

  </div>

  <script src="popup.js"></script>
</body>
</html>
