<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instant Answer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --border:rgba(255,255,255,.1);
  --text:#ffffff;
  --muted:#b8b8b8;
  --green:#b7ff4a;
}

body{
  width:430px;
  height:620px;
  overflow:hidden;
  font-family:Inter, Arial, sans-serif;
  color:var(--text);
  background:#050505;
  padding:10px;
}

.app{
  height:100%;
  overflow:hidden;
  border-radius:28px;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:
    radial-gradient(circle at top left,rgba(183,255,74,.16),transparent 30%),
    linear-gradient(180deg,#111,#050505);
  border:1px solid var(--border);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-shrink:0;
}

.brand{
  font-size:14px;
  font-weight:950;
}

.brand span{
  color:var(--green);
}

.top-actions{
  display:flex;
  gap:7px;
}

button{
  border:none;
  cursor:pointer;
  transition:.18s ease;
  font-family:Inter, Arial, sans-serif;
}

.small-btn,
.upgrade-btn{
  padding:8px 10px;
  border-radius:14px;
  font-size:10px;
  font-weight:900;
}

.small-btn{
  color:white;
  background:rgba(255,255,255,.07);
  border:1px solid var(--border);
}

.upgrade-btn{
  color:#070707;
  background:var(--green);
}

.hero{
  flex-shrink:0;
}

.hero h1{
  font-size:34px;
  line-height:.9;
  letter-spacing:-2px;
  font-weight:950;
}

.hero h1 span{
  color:var(--green);
}

.subtitle{
  margin-top:7px;
  font-size:12px;
  line-height:1.35;
  color:var(--muted);
}

.status-row{
  display:flex;
  gap:7px;
  margin-top:9px;
}

.status-pill{
  padding:8px 10px;
  border-radius:999px;
  font-size:10px;
  font-weight:900;
  color:#070707;
  background:var(--green);
}

#pageStatus{
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
  color:var(--muted);
  background:rgba(255,255,255,.07);
  border:1px solid var(--border);
}

.mode-tabs{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:5px;
  flex-shrink:0;
}

.mode-tab{
  padding:9px 3px;
  border-radius:14px;
  font-size:9px;
  font-weight:950;
  color:var(--muted);
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

.mode-tab.active{
  color:#070707;
  background:var(--green);
  border-color:transparent;
}

.panel{
  flex:1;
  min-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  border-radius:24px;
  padding:13px;
  background:rgba(255,255,255,.055);
  border:1px solid var(--border);
}

.panel-head{
  flex-shrink:0;
  margin-bottom:8px;
}

.panel-title{
  font-size:20px;
  font-weight:950;
}

.panel-subtitle{
  margin-top:4px;
  font-size:11.5px;
  line-height:1.35;
  color:var(--muted);
}

#result{
  flex:1;
  min-height:95px;
  overflow-y:auto;
  padding:12px;
  margin-bottom:8px;
  font-size:13.5px;
  line-height:1.65;
  border-radius:20px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(255,255,255,.08);
}

.answer-label{
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:950;
  color:var(--green);
  margin-bottom:6px;
}

.answer-title{
  font-size:18px;
  font-weight:950;
  margin-bottom:8px;
}

.answer-content{
  color:#e8e8e8;
  white-space:pre-wrap;
  word-break:break-word;
}

.mode-tools{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  margin-bottom:8px;
  flex-shrink:0;
}

.tool-btn{
  padding:9px 5px;
  border-radius:14px;
  font-size:10px;
  font-weight:950;
  color:var(--muted);
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

.tool-btn.active{
  color:#070707;
  background:var(--green);
}

.file-box{
  display:none;
  margin-bottom:8px;
  padding:10px;
  border-radius:16px;
  background:rgba(255,255,255,.045);
  border:1px dashed rgba(255,255,255,.18);
  flex-shrink:0;
}

.file-box input{
  width:100%;
  color:white;
  font-size:11px;
}

#pdfFileName,
#imageFileName{
  margin-top:6px;
  font-size:10.5px;
  color:var(--muted);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.composer{
  flex-shrink:0;
  display:flex;
  flex-direction:column;
  gap:8px;
}

textarea{
  width:100%;
  height:54px;
  resize:none;
  outline:none;
  border:none;
  padding:12px;
  border-radius:17px;
  font-size:13px;
  line-height:1.35;
  font-family:Inter, Arial, sans-serif;
  color:white;
  background:rgba(255,255,255,.065);
  border:1px solid var(--border);
}

textarea::placeholder{
  color:#777;
}

.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.primary-btn,
.secondary-btn{
  width:100%;
  padding:11px;
  border-radius:17px;
  font-size:13px;
  font-weight:950;
}

.primary-btn{
  color:#070707;
  background:var(--green);
}

.secondary-btn{
  color:white;
  background:rgba(255,255,255,.07);
  border:1px solid var(--border);
}

.loading{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

.code-block{
  background:#050505;
  border:1px solid rgba(255,255,255,.1);
  padding:10px;
  border-radius:12px;
  overflow:auto;
  margin:8px 0;
  font-size:12px;
  color:#e5e7eb;
}

.source-box,
.history-item{
  margin-top:9px;
  padding:10px;
  border-radius:16px;
  background:rgba(255,255,255,.055);
  border:1px solid var(--border);
}

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  border-radius:999px;
  background:rgba(255,255,255,.2);
}
</style>
</head>

<body>
<div class="app">

  <div class="top">
    <div class="brand">Instant <span>Answer</span></div>

    <div class="top-actions">
      <button id="upgradeBtn" class="upgrade-btn" type="button">Upgrade</button>
      <button id="historyBtn" class="small-btn" type="button">History</button>
      <button id="clearBtn" class="small-btn" type="button">Clear</button>
    </div>
  </div>

  <div class="hero">
    <h1>Fast AI<br><span>for work</span></h1>
    <div class="subtitle">
      Quick answers, study notes, page reading, YouTube summaries and file analysis.
    </div>

    <div class="status-row">
      <div id="proStatus" class="status-pill">Free</div>
      <div id="pageStatus" class="status-pill">Ready</div>
    </div>
  </div>

  <div class="mode-tabs">
    <button id="quickModeBtn" class="mode-tab active" type="button">Quick</button>
    <button id="deepModeBtn" class="mode-tab" type="button">Deep</button>
    <button id="studyModeBtn" class="mode-tab" type="button">Study</button>
    <button id="pageModeBtn" class="mode-tab" type="button">Page</button>
    <button id="youtubeModeBtn" class="mode-tab" type="button">YouTube</button>
    <button id="filesModeBtn" class="mode-tab" type="button">Files</button>
  </div>

  <div class="panel">

    <div class="panel-head">
      <div id="panelTitle" class="panel-title">Quick Mode</div>
      <div id="panelSubtitle" class="panel-subtitle">Fast answers with simple wording.</div>
    </div>

    <div id="result">
      <div class="loading">Ready</div>
    </div>

    <div id="studyTools" class="mode-tools">
      <button id="studyExplainBtn" class="tool-btn active" type="button">Explain</button>
      <button id="studyNotesBtn" class="tool-btn" type="button">Notes</button>
      <button id="studyQuizBtn" class="tool-btn" type="button">Quiz</button>
    </div>

    <div id="pageTools" class="mode-tools">
      <button id="pageReadBtn" class="tool-btn active" type="button">Page</button>
      <button id="pageSelectedBtn" class="tool-btn" type="button">Selected</button>
      <button id="pageSummaryBtn" class="tool-btn" type="button">Summary</button>
    </div>

    <div id="youtubeTools" class="mode-tools">
      <button id="ytSummaryBtn" class="tool-btn active" type="button">Summary</button>
      <button id="ytNotesBtn" class="tool-btn" type="button">Notes</button>
      <button id="ytQuizBtn" class="tool-btn" type="button">Quiz</button>
    </div>

    <div id="filesTools" class="mode-tools">
      <button id="filePdfBtn" class="tool-btn active" type="button">PDF</button>
      <button id="fileImageBtn" class="tool-btn" type="button">Image</button>
      <button id="fileNotesBtn" class="tool-btn" type="button">Notes</button>
    </div>

    <div id="pdfUploadBox" class="file-box">
      <input id="pdfFileInput" type="file" accept="application/pdf,.pdf" />
      <div id="pdfFileName">No PDF selected</div>
    </div>

    <div id="imageUploadBox" class="file-box">
      <input id="imageFileInput" type="file" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp" />
      <div id="imageFileName">No image selected</div>
    </div>

    <div class="composer">
      <textarea id="mainInput" placeholder="Ask anything..."></textarea>

      <div class="action-row">
        <button id="mainActionBtn" class="primary-btn" type="button">Send</button>
        <button id="readPageBtn" class="secondary-btn" type="button">Read page</button>
      </div>
    </div>

  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
