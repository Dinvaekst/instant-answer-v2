<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instant Answer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--green:#b7ff4a;--bg:#050505;--card:#1c1c1c;--muted:#b8b8b8;--border:rgba(255,255,255,.12);--danger:#ff6b6b}
body{width:430px;height:620px;overflow:hidden;font-family:Arial,sans-serif;background:var(--bg);color:white;padding:10px}
.app{height:100%;border-radius:28px;padding:16px;background:radial-gradient(circle at top left,rgba(183,255,74,.16),transparent 32%),linear-gradient(180deg,#111,#050505);border:1px solid var(--border);display:flex;flex-direction:column;gap:10px}
button{border:none;cursor:pointer;font-family:Arial,sans-serif}
.hidden{display:none!important}
.main-app{height:100%;display:flex;flex-direction:column;gap:10px;min-height:0}
.top{display:flex;justify-content:space-between;align-items:center;gap:8px}
.top-actions{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.small-btn{padding:8px 10px;border-radius:15px;font-size:10px;font-weight:900;white-space:nowrap;background:rgba(255,255,255,.07);color:white;border:1px solid var(--border)}
.upgrade-btn{padding:8px 10px;border-radius:15px;font-size:10px;font-weight:900;white-space:nowrap;background:var(--green);color:#050505;border:none}
.already-paid-btn{padding:8px 10px;border-radius:15px;font-size:10px;font-weight:900;white-space:nowrap;background:rgba(183,255,74,.15);color:var(--green);border:1px solid var(--green)}
.brand{font-size:16px;font-weight:900}
.brand span{color:var(--green)}
.hero h1{font-size:42px;line-height:.9;font-weight:950;letter-spacing:-2px}
.hero h1 span{color:var(--green)}
.subtitle{color:var(--muted);font-size:13px;line-height:1.4}
.status-row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.status-pill{padding:9px 11px;border-radius:999px;background:var(--green);color:#050505;font-size:11px;font-weight:900;white-space:nowrap}
#pageStatus{background:rgba(255,255,255,.07);color:white;border:1px solid var(--border);flex:1}
.mode-tabs{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.mode-tab{padding:10px 4px;border-radius:15px;font-size:10px;font-weight:900;background:rgba(255,255,255,.07);color:white;border:1px solid var(--border)}
.mode-tab.active{background:var(--green);color:#050505;border:none}
.panel{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column;border-radius:24px;padding:14px;background:rgba(255,255,255,.055);border:1px solid var(--border)}
.panel-title{font-size:23px;font-weight:950}
.panel-subtitle{color:var(--muted);font-size:13px;line-height:1.4}
#result{flex:1;min-height:100px;overflow-y:auto;margin:10px 0;padding:14px;border-radius:20px;background:rgba(255,255,255,.045);border:1px solid var(--border);font-size:14px;line-height:1.6}
.answer-label{font-size:11px;text-transform:uppercase;color:var(--green);font-weight:950;margin-bottom:8px}
.answer-title{font-size:20px;font-weight:950;margin-bottom:8px}
.answer-content{white-space:pre-wrap;word-break:break-word}
.loading{height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.mode-tools{display:none;grid-template-columns:repeat(3,1fr);gap:7px;margin-bottom:8px}
.tool-btn{padding:9px;border-radius:14px;font-size:10px;font-weight:900;background:rgba(255,255,255,.07);color:white;border:1px solid var(--border)}
.tool-btn.active{background:var(--green);color:#050505;border:none}
.file-box{display:none;margin-bottom:8px;padding:10px;border-radius:16px;background:rgba(255,255,255,.045);border:1px dashed var(--border)}
.file-box input{width:100%;color:white;font-size:11px}
#pdfFileName,#imageFileName{margin-top:6px;color:var(--muted);font-size:11px}
textarea{width:100%;outline:none;border:1px solid var(--border);background:#242424;color:white;border-radius:17px;padding:14px;font-size:14px;height:58px;resize:none;font-family:Arial,sans-serif}
.action-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.primary-btn{padding:13px;border-radius:18px;font-weight:950;font-size:14px;background:var(--green);color:#050505;border:none}
.secondary-btn{padding:13px;border-radius:18px;font-weight:950;font-size:14px;background:rgba(255,255,255,.07);color:white;border:1px solid var(--border)}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:999px}
</style>
</head>
<body>
<div class="app">
  <div id="mainApp" class="main-app">
    <div class="top">
      <div class="brand">Instant <span>Answer</span></div>
      <div class="top-actions">
        <button id="upgradeBtn" class="upgrade-btn" type="button">Upgrade ⚡</button>
        <button id="alreadyPaidBtn" class="already-paid-btn" type="button">Already paid?</button>
        <button id="historyBtn" class="small-btn" type="button">History</button>
        <button id="clearBtn" class="small-btn" type="button">Clear</button>
      </div>
    </div>

    <div class="hero">
      <h1>Fast AI<br><span>for work</span></h1>
      <div class="subtitle">Quick answers, study notes, page reading, YouTube summaries and file analysis.</div>
      <div class="status-row">
        <div id="proStatus" class="status-pill">Free</div>
        <div id="pageStatus" class="status-pill">Ready</div>
      </div>
    </div>

    <div class="mode-tabs">
      <button id="quickModeBtn" class="mode-tab active" type="button">Quick</button>
      <button id="deepModeBtn" class="mode-tab" type="button">Deep</button>
      <button id="studyModeBtn" class="mode-tab" type="button">Study</button>
      <button id="pageModeBtn" class="mode-tab" type="button">Page</button>
      <button id="youtubeModeBtn" class="mode-tab" type="button">YouTube</button>
      <button id="filesModeBtn" class="mode-tab" type="button">Files</button>
    </div>

    <div class="panel">
      <div>
        <div id="panelTitle" class="panel-title">Quick Mode</div>
        <div id="panelSubtitle" class="panel-subtitle">Fast answers with simple wording.</div>
      </div>

      <div id="result"><div class="loading">Ready</div></div>

      <div id="studyTools" class="mode-tools">
        <button id="studyExplainBtn" class="tool-btn active" type="button">Explain</button>
        <button id="studyNotesBtn" class="tool-btn" type="button">Notes</button>
        <button id="studyQuizBtn" class="tool-btn" type="button">Quiz</button>
      </div>

      <div id="pageTools" class="mode-tools">
        <button id="pageReadBtn" class="tool-btn active" type="button">Page</button>
        <button id="pageSelectedBtn" class="tool-btn" type="button">Selected</button>
        <button id="pageSummaryBtn" class="tool-btn" type="button">Summary</button>
      </div>

      <div id="youtubeTools" class="mode-tools">
        <button id="ytSummaryBtn" class="tool-btn active" type="button">Summary</button>
        <button id="ytNotesBtn" class="tool-btn" type="button">Notes</button>
        <button id="ytQuizBtn" class="tool-btn" type="button">Quiz</button>
      </div>

      <div id="filesTools" class="mode-tools">
        <button id="filePdfBtn" class="tool-btn active" type="button">PDF</button>
        <button id="fileImageBtn" class="tool-btn" type="button">Image</button>
        <button id="fileNotesBtn" class="tool-btn" type="button">Notes</button>
      </div>

      <div id="pdfUploadBox" class="file-box">
        <input id="pdfFileInput" type="file" accept="application/pdf,.pdf" />
        <div id="pdfFileName">No PDF selected</div>
      </div>

      <div id="imageUploadBox" class="file-box">
        <input id="imageFileInput" type="file" accept="image/png,image/jpeg,image/webp" />
        <div id="imageFileName">No image selected</div>
      </div>

      <textarea id="mainInput" placeholder="Ask anything..."></textarea>

      <div class="action-row">
        <button id="mainActionBtn" class="primary-btn" type="button">Send</button>
        <button id="readPageBtn" class="secondary-btn" type="button">Read page</button>
      </div>
    </div>
  </div>
</div>
<script src="popup.js"></script>
</body>
</html>
