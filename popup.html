<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Instant Answer</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

:root{
  --bg:#080808;
  --card:#111111;
  --card2:#171717;
  --soft:#202020;
  --border:rgba(255,255,255,.09);
  --text:#ffffff;
  --muted:#a3a3a3;
  --green:#b7ff4a;
  --green2:#71e000;
  --blue:#7dd3fc;
  --danger:#ff5c5c;
  --shadow:0 24px 80px rgba(0,0,0,.55);
}

body{
  width:430px;
  height:620px;
  overflow:hidden;
  font-family:Inter, Arial, sans-serif;
  color:var(--text);
  background:
    radial-gradient(circle at top left,rgba(183,255,74,.18),transparent 32%),
    radial-gradient(circle at bottom right,rgba(125,211,252,.12),transparent 38%),
    #050505;
  padding:12px;
}

.app{
  height:100%;
  overflow:hidden;
  border-radius:34px;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  background:linear-gradient(180deg,rgba(18,18,18,.92),rgba(7,7,7,.96));
  border:1px solid var(--border);
  box-shadow:var(--shadow);
}

.top{
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.brand{
  font-size:14px;
  font-weight:950;
  letter-spacing:-.2px;
}

.brand span{
  color:var(--green);
}

.top-actions{
  display:flex;
  gap:7px;
}

button{
  border:none;
  cursor:pointer;
  transition:.18s ease;
  font-family:Inter, Arial, sans-serif;
}

.small-btn{
  padding:8px 10px;
  border-radius:14px;
  font-size:10px;
  font-weight:900;
  color:white;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

.small-btn:hover{
  background:rgba(255,255,255,.12);
  transform:translateY(-1px);
}

.hero h1{
  font-size:38px;
  line-height:.92;
  letter-spacing:-2px;
  font-weight:950;
}

.hero h1 span{
  color:var(--green);
}

.subtitle{
  margin-top:9px;
  font-size:12.5px;
  line-height:1.45;
  color:var(--muted);
}

.status-row{
  display:flex;
  gap:7px;
  margin-top:12px;
}

.status-pill{
  padding:9px 11px;
  border-radius:999px;
  font-size:10.5px;
  font-weight:900;
  white-space:nowrap;
  color:#080808;
  background:var(--green);
}

#pageStatus{
  flex:1;
  overflow:hidden;
  text-overflow:ellipsis;
  color:var(--muted);
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

.mode-tabs{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
}

.mode-tab{
  padding:10px 4px;
  border-radius:15px;
  font-size:9.3px;
  font-weight:950;
  color:var(--muted);
  background:rgba(255,255,255,.055);
  border:1px solid var(--border);
}

.mode-tab:hover{
  color:white;
  background:rgba(255,255,255,.11);
}

.mode-tab.active{
  color:#080808;
  background:var(--green);
  border-color:transparent;
  box-shadow:0 12px 28px rgba(183,255,74,.22);
}

.panel{
  flex:1;
  min-height:0;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  border-radius:28px;
  padding:15px;
  background:rgba(255,255,255,.055);
  border:1px solid var(--border);
}

.panel-head{
  margin-bottom:12px;
}

.panel-title{
  font-size:21px;
  font-weight:950;
  letter-spacing:-.5px;
}

.panel-subtitle{
  margin-top:5px;
  font-size:12px;
  line-height:1.45;
  color:var(--muted);
}

#result{
  flex:1;
  min-height:0;
  overflow-y:auto;
  padding-right:4px;
  margin-bottom:11px;
  font-size:13.5px;
  line-height:1.65;
}

.answer-box{
  animation:fadeUp .22s ease;
}

.answer-label{
  font-size:10px;
  letter-spacing:1px;
  text-transform:uppercase;
  font-weight:950;
  color:var(--green);
  margin-bottom:7px;
}

.answer-title{
  font-size:19px;
  font-weight:950;
  margin-bottom:9px;
}

.answer-content{
  color:#e5e5e5;
}

.answer-content h1,
.answer-content h2,
.answer-content h3{
  margin:12px 0 6px;
  color:white;
}

.msg{
  margin-bottom:11px;
  padding:13px;
  border-radius:20px;
  animation:fadeUp .22s ease;
}

.user-msg{
  margin-left:42px;
  color:#080808;
  background:var(--green);
  box-shadow:0 12px 24px rgba(183,255,74,.18);
}

.ai-msg{
  margin-right:18px;
  color:#e5e5e5;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

.msg-role{
  font-size:9.5px;
  font-weight:950;
  opacity:.65;
  margin-bottom:5px;
  text-transform:uppercase;
  letter-spacing:.8px;
}

.mode-tools{
  display:none;
  grid-template-columns:repeat(3,1fr);
  gap:7px;
  margin-bottom:10px;
}

.tool-btn{
  padding:10px 6px;
  border-radius:14px;
  font-size:10px;
  font-weight:950;
  color:var(--muted);
  background:rgba(255,255,255,.055);
  border:1px solid var(--border);
}

.tool-btn.active{
  color:#080808;
  background:var(--green);
  border-color:transparent;
}

.file-box{
  display:none;
  margin-bottom:10px;
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.045);
  border:1px dashed rgba(255,255,255,.18);
}

.file-box input{
  width:100%;
  color:white;
  font-size:11px;
}

#pdfFileName,
#imageFileName{
  margin-top:8px;
  font-size:11px;
  color:var(--muted);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}

.composer{
  display:flex;
  flex-direction:column;
  gap:9px;
}

textarea{
  width:100%;
  height:78px;
  resize:none;
  outline:none;
  border:none;
  padding:13px;
  border-radius:18px;
  font-size:13px;
  line-height:1.45;
  font-family:Inter, Arial, sans-serif;
  color:white;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

textarea::placeholder{
  color:#777;
}

textarea:focus{
  border-color:rgba(183,255,74,.55);
  box-shadow:0 0 0 4px rgba(183,255,74,.1);
}

.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:9px;
}

.primary-btn,
.secondary-btn{
  width:100%;
  padding:12px;
  border-radius:18px;
  font-size:13px;
  font-weight:950;
}

.primary-btn{
  color:#080808;
  background:var(--green);
  box-shadow:0 12px 28px rgba(183,255,74,.22);
}

.primary-btn:hover{
  transform:translateY(-1px);
}

.secondary-btn{
  color:white;
  background:rgba(255,255,255,.06);
  border:1px solid var(--border);
}

.secondary-btn:hover{
  background:rgba(255,255,255,.12);
}

.code-block{
  background:#050505;
  border:1px solid rgba(255,255,255,.1);
  padding:12px;
  border-radius:14px;
  overflow:auto;
  margin:10px 0;
  font-size:12px;
  line-height:1.6;
  color:#e5e7eb;
}

.source-box,
.history-item{
  margin-top:10px;
  padding:12px;
  border-radius:18px;
  background:rgba(255,255,255,.055);
  border:1px solid var(--border);
}

.loading{
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:13px;
  color:var(--muted);
}

.typing-dots{
  display:flex;
  justify-content:center;
  gap:5px;
  margin-top:12px;
}

.typing-dots span{
  width:7px;
  height:7px;
  background:var(--green);
  border-radius:50%;
  animation:dotPulse 1.2s infinite ease-in-out;
}

.typing-dots span:nth-child(2){
  animation-delay:.2s;
}

.typing-dots span:nth-child(3){
  animation-delay:.4s;
}

::-webkit-scrollbar{
  width:6px;
}

::-webkit-scrollbar-thumb{
  border-radius:999px;
  background:rgba(255,255,255,.18);
}

@keyframes fadeUp{
  from{
    opacity:0;
    transform:translateY(8px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes dotPulse{
  0%,80%,100%{
    opacity:.25;
    transform:scale(.8);
  }
  40%{
    opacity:1;
    transform:scale(1.15);
  }
}
</style>
</head>

<body>
<div class="app">

  <div class="top">
    <div class="brand">Instant <span>Answer</span></div>
    <div class="top-actions">
      <button id="historyBtn" class="small-btn" type="button">History</button>
      <button id="clearBtn" class="small-btn" type="button">Clear</button>
    </div>
  </div>

  <div class="hero">
    <h1>Fast AI<br><span>for work</span></h1>
    <div class="subtitle">
      Quick answers, deep help, study notes, page reading, YouTube summaries and file analysis.
    </div>

    <div class="status-row">
      <div id="proStatus" class="status-pill">Free</div>
      <div id="pageStatus" class="status-pill">Ready</div>
    </div>
  </div>

  <div class="mode-tabs">
    <button id="quickModeBtn" class="mode-tab active" type="button">Quick</button>
    <button id="deepModeBtn" class="mode-tab" type="button">Deep</button>
    <button id="studyModeBtn" class="mode-tab" type="button">Study</button>
    <button id="pageModeBtn" class="mode-tab" type="button">Page</button>
    <button id="youtubeModeBtn" class="mode-tab" type="button">YouTube</button>
    <button id="filesModeBtn" class="mode-tab" type="button">Files</button>
  </div>

  <div class="panel">

    <div class="panel-head">
      <div id="panelTitle" class="panel-title">Quick Mode</div>
      <div id="panelSubtitle" class="panel-subtitle">Fast answers with simple wording.</div>
    </div>

    <div id="result">
      <div class="loading">Ready</div>
    </div>

    <div id="studyTools" class="mode-tools">
      <button id="studyExplainBtn" class="tool-btn active" type="button">Explain</button>
      <button id="studyNotesBtn" class="tool-btn" type="button">Notes</button>
      <button id="studyQuizBtn" class="tool-btn" type="button">Quiz</button>
    </div>

    <div id="pageTools" class="mode-tools">
      <button id="pageReadBtn" class="tool-btn active" type="button">Page</button>
      <button id="pageSelectedBtn" class="tool-btn" type="button">Selected</button>
      <button id="pageSummaryBtn" class="tool-btn" type="button">Summary</button>
    </div>

    <div id="youtubeTools" class="mode-tools">
      <button id="ytSummaryBtn" class="tool-btn active" type="button">Summary</button>
      <button id="ytNotesBtn" class="tool-btn" type="button">Notes</button>
      <button id="ytQuizBtn" class="tool-btn" type="button">Quiz</button>
    </div>

    <div id="filesTools" class="mode-tools">
      <button id="filePdfBtn" class="tool-btn active" type="button">PDF</button>
      <button id="fileImageBtn" class="tool-btn" type="button">Image</button>
      <button id="fileNotesBtn" class="tool-btn" type="button">Notes</button>
    </div>

    <div id="pdfUploadBox" class="file-box">
      <input id="pdfFileInput" type="file" accept="application/pdf,.pdf" />
      <div id="pdfFileName">No PDF selected</div>
    </div>

    <div id="imageUploadBox" class="file-box">
      <input id="imageFileInput" type="file" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp" />
      <div id="imageFileName">No image selected</div>
    </div>

    <div class="composer">
      <textarea id="mainInput" placeholder="Ask anything..."></textarea>

      <div class="action-row">
        <button id="mainActionBtn" class="primary-btn" type="button">Send</button>
        <button id="readPageBtn" class="secondary-btn" type="button">Read page</button>
      </div>
    </div>

  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
